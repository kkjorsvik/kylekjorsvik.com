when:
  event: push
  branch: main

# TEMP: git.kkjorsvik.com does not have a trusted TLS cert yet, so the clone
# fails cert verification. Skip verification for now — REMOVE this whole clone
# block once the Forgejo host has a valid certificate.
clone:
  - name: clone
    image: woodpeckerci/plugin-git
    environment:
      GIT_SSL_NO_VERIFY: "true"

steps:
  - name: build-site
    image: golang:1.26-alpine
    commands:
      - go build -o build ./cmd/build/
      - ./build

  - name: deploy
    image: alpine
    environment:
      DEPLOY_HOST:
        from_secret: deploy_host
      DEPLOY_USER:
        from_secret: deploy_user
      DEPLOY_KEY:
        from_secret: deploy_key
      DEPLOY_PATH:
        from_secret: deploy_path
    commands:
      - apk add --no-cache openssh rsync
      - mkdir -p ~/.ssh && chmod 700 ~/.ssh
      - printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - echo "StrictHostKeyChecking accept-new" >> ~/.ssh/config
      - rsync -avz --delete output/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH"
