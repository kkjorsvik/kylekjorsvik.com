<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{if .Title}}{{.Title}} · {{end}}{{.SiteTitle}}</title>
  <meta name="description" content="{{.Description}}">

  <link rel="canonical" href="{{.SiteURL}}{{.URL}}">
  <meta property="og:title" content="{{if .Title}}{{.Title}}{{else}}{{.SiteTitle}}{{end}}">
  <meta property="og:description" content="{{.Description}}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{.SiteURL}}{{.URL}}">

  <link rel="alternate" type="application/rss+xml" title="{{.SiteTitle}}" href="/feed.xml">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/css/syntax.css">
  <link rel="stylesheet" href="/static/css/custom.css">

  <!-- Apply saved theme before first paint to avoid a flash of the wrong theme. -->
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <nav class="container site-nav">
      <a href="/" class="site-brand">Kyle Kjorsvik</a>
      <ul class="nav-links">
        <li><a href="/blog/" {{if eq .Nav "blog"}}class="active"{{end}}>Blog</a></li>
        <li><a href="/projects/" {{if eq .Nav "projects"}}class="active"{{end}}>Projects</a></li>
        <li><a href="/uses/" {{if eq .Nav "uses"}}class="active"{{end}}>Uses</a></li>
        <li><a href="/about/" {{if eq .Nav "about"}}class="active"{{end}}>About</a></li>
        <li>
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme">
            <span class="theme-icon-dark" aria-hidden="true">☾</span>
            <span class="theme-icon-light" aria-hidden="true">☀</span>
          </button>
        </li>
      </ul>
    </nav>
  </header>

  <main class="container site-main">
    {{block "content" .}}{{end}}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© Kyle Kjorsvik · <a href="/feed.xml">RSS</a></p>
      {{if not .BuildTime.IsZero}}<p class="footer-meta">Generated &amp; deployed {{datetime .BuildTime}}</p>{{end}}
    </div>
  </footer>

  <script>
    (function() {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      btn.addEventListener('click', function() {
        var current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
        var next = current === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    })();
  </script>
</body>
</html>
